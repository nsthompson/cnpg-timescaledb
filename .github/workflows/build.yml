name: Build and publish

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  # Weekly rebuild to pick up base-image and security updates.
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      base_image:
        description: "Override the CNPG base operand image (blank = default)"
        required: false
        default: ""
      timescaledb_version:
        description: "Pin a TimescaleDB version, e.g. 2.24.0 (blank = latest)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  # Must match the major version of DEFAULT_BASE_IMAGE.
  PG_MAJOR: "18"
  DEFAULT_BASE_IMAGE: "ghcr.io/cloudnative-pg/postgresql:18.3-standard-bookworm"
  DEFAULT_TIMESCALEDB_VERSION: "2.24.0"
  PLATFORMS: "linux/amd64,linux/arm64"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # push to GHCR
      id-token: write        # cosign keyless signing
      attestations: write    # build provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Compute lowercase image name
        id: img
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve build arguments
        id: args
        run: |
          BASE_IMAGE="${{ github.event.inputs.base_image }}"
          [ -z "$BASE_IMAGE" ] && BASE_IMAGE="${DEFAULT_BASE_IMAGE}"
          TS_VER="${{ github.event.inputs.timescaledb_version }}"
          [ -z "$TS_VER" ] && TS_VER="${DEFAULT_TIMESCALEDB_VERSION}"
          echo "base_image=${BASE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "timescaledb_version=${TS_VER}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=pg${{ env.PG_MAJOR }},enable={{is_default_branch}}
            type=raw,value=pg${{ env.PG_MAJOR }}-ts${{ steps.args.outputs.timescaledb_version }},enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=cnpg-timescaledb
            org.opencontainers.image.description=CloudNativePG PostgreSQL ${{ env.PG_MAJOR }} operand image with the TimescaleDB extension
            org.opencontainers.image.licenses=PostgreSQL AND Apache-2.0 AND TSL

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ steps.args.outputs.base_image }}
            PG_MAJOR=${{ env.PG_MAJOR }}
            TIMESCALEDB_VERSION=${{ steps.args.outputs.timescaledb_version }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${{ steps.img.outputs.name }}@${DIGEST}"
